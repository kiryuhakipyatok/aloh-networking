stages:
  - build
  - test
  - deploy

build-job:
  stage: build
  script:
    - docker build -t aloh-networking-image .

test-job:
  stage: test
  script:
    - echo "testing..."
    - sleep 10s

deploy-job:
  stage: deploy 
  script:
    - cp $ENV_FILE .env
    - docker-compose rm -s aloh-networking-clients || true
    - docker-compose -f docker-compose.yaml up -d --force-recreate aloh-networking-clients
    - sleep 5
    - docker-compose logs aloh-networking-clients